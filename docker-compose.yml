services:
  postgres:
    image: postgres:16
    container_name: salon_de_lien_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon_password
      POSTGRES_DB: salon_de_lien
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
